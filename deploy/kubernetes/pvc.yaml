apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autotriage-graph-pvc
  namespace: autotriage
  labels:
    app.kubernetes.io/name: autotriage
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
