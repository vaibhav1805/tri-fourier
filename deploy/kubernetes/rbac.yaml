---
# Read-only access to cluster resources for diagnostics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autotriage-reader
  labels:
    app.kubernetes.io/name: autotriage
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - services
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
      - jobs
      - cronjobs
      - nodes
      - events
      - configmaps
      - endpoints
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autotriage-reader-binding
  labels:
    app.kubernetes.io/name: autotriage
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autotriage-reader
subjects:
  - kind: ServiceAccount
    name: autotriage
    namespace: autotriage
---
# Remediation role (separate, conditionally bound)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autotriage-remediator
  labels:
    app.kubernetes.io/name: autotriage
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - deployments
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]  # For pod restart
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get"]
    # Needed to read before patching
---
# Bind remediation role only when auto-remediation is enabled
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autotriage-remediator-binding
  labels:
    app.kubernetes.io/name: autotriage
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autotriage-remediator
subjects:
  - kind: ServiceAccount
    name: autotriage
    namespace: autotriage
