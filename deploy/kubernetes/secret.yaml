apiVersion: v1
kind: Secret
metadata:
  name: trifourier-secrets
  namespace: trifourier
  labels:
    app.kubernetes.io/name: trifourier
    app.kubernetes.io/component: secrets
type: Opaque
# Values must be base64-encoded. Replace placeholders before applying.
# In production, use ExternalSecrets or AWS Secrets Manager CSI driver instead.
stringData:
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_APP_TOKEN: "REPLACE_ME"
  SLACK_SIGNING_SECRET: "REPLACE_ME"
