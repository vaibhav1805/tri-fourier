# Trifourier Helm Values

replicaCount: 1

image:
  repository: trifourier
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: trifourier
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/trifourier

# Application configuration
config:
  graphBackend: falkordb_lite
  graphDataDir: /app/data/graph
  modelProvider: bedrock
  modelId: "us.anthropic.claude-sonnet-4-6-v1:0"
  prometheusUrl: "http://prometheus.monitoring.svc.cluster.local:9090"
  logLevel: info
  otelEndpoint: ""
  otelServiceName: trifourier

# Secrets (use external secrets in production)
secrets:
  create: true
  slackBotToken: ""
  slackAppToken: ""
  slackSigningSecret: ""

# Persistence for FalkorDBLite graph data
persistence:
  enabled: true
  storageClass: gp3
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# Service
service:
  type: ClusterIP
  port: 80

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: trifourier.internal.company.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resources
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12

# RBAC
rbac:
  reader:
    create: true
  remediator:
    create: true

# Backup CronJobs
backup:
  bgsave:
    enabled: true
    schedule: "*/15 * * * *"
  s3Export:
    enabled: false
    schedule: "0 2 * * *"
    bucket: trifourier-backups
    prefix: graph-snapshots

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}
