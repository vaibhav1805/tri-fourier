apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trifourier.fullname" . }}-config
  labels:
    {{- include "trifourier.labels" . | nindent 4 }}
data:
  GRAPH_BACKEND: {{ .Values.config.graphBackend | quote }}
  GRAPH_DATA_DIR: {{ .Values.config.graphDataDir | quote }}
  MODEL_PROVIDER: {{ .Values.config.modelProvider | quote }}
  MODEL_ID: {{ .Values.config.modelId | quote }}
  PROMETHEUS_URL: {{ .Values.config.prometheusUrl | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  OTEL_SERVICE_NAME: {{ .Values.config.otelServiceName | quote }}
