{{- if .Values.rbac.reader.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "autotriage.fullname" . }}-reader
  labels:
    {{- include "autotriage.labels" . | nindent 4 }}
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - services
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
      - jobs
      - cronjobs
      - nodes
      - events
      - configmaps
      - endpoints
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "autotriage.fullname" . }}-reader-binding
  labels:
    {{- include "autotriage.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "autotriage.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "autotriage.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.rbac.remediator.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "autotriage.fullname" . }}-remediator
  labels:
    {{- include "autotriage.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - deployments
    verbs: ["patch", "update", "get"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "autotriage.fullname" . }}-remediator-binding
  labels:
    {{- include "autotriage.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "autotriage.fullname" . }}-remediator
subjects:
  - kind: ServiceAccount
    name: {{ include "autotriage.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
